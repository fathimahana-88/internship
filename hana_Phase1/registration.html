<HTML>
    <HEAD><TITLE>FORM</TITLE></HEAD>
    <BODY><H1>REGISTRATION FORM</H1>
    <FORM>
        NAME: <INPUT TYPE="TEXT" NAME="NAME"><BR><BR>
            EMAIL: <INPUT TYPE="EMAIL" NAME="EMAIL" required><BR><BR>
                PASSWORD: <INPUT TYPE="PASSWORD" NAME="PASSWORD" minlength="6"><BR><BR>
                    GENDER: <INPUT TYPE="RADIO" NAME="GENDER" VALUE="MALE" required>MALE
                        <INPUT TYPE="RADIO"  NAME="GENDER" VALUE="FEMALE">FEMALE
                            <INPUT TYPE="RADIO" NAME="GENDER" VALUE="OTHERS">OTHERS<BR><BR>
                            HOBBIES: <INPUT TYPE="CHECKBOX" NAME="HOBBY" VALUE="READING">READING
                                <INPUT TYPE="CHECKBOX" NAME="HOBBY" VALUE="GAMING">GAMING
                                    <INPUT TYPE="CHECKBOX" NAME="HOBBY" VALUE="SPORTS">SPORTS<BR><BR>
                                        <INPUT TYPE="SUBMIT" VALUE="SAVE">
    </FORM>
    </BODY>
</HTML>
