<html>
<head>
    <title>Array Display</title>
</head>
<body>

<h2>Fruits List</h2>
<ul id="list"></ul>

<script>
let fruits = ["Apple", "Mango", "Orange"];
let ul = document.getElementById("list");
fruits.forEach(function(item) {
    let li = document.createElement("li");
    li.textContent = item;
    ul.appendChild(li);
});
</script>
</body>
</html>
