<html>
<head>
    <title>Array</title>
</head>
<body>
<h2>Items List</h2>
<ul id="list"></ul>

<script>
    const items = ["Apple", "Banana", "Mango"];
    const list = document.getElementById("list");
    items.forEach(item => {
        const li = document.createElement("li");
        li.textContent = item;
        list.appendChild(li);
    });
</script>
</body>
</html>
