<html>
<head>
    <title>Live Preview</title>
</head>
<body>

<input type="text" id="input" placeholder="Type here...">
<p id="preview"></p>

<script>
document.getElementById("input").addEventListener("keyup", function() {
    document.getElementById("preview").textContent = this.value;
});
</script>
</body>
</html>
